<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Snooker Tracker</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" href="icon-512.png" />
    <link href="SnookerTracker.styles.css" rel="stylesheet" />
    <link rel="manifest" href="manifest.webmanifest" />
</head>

<body>
    <div id="app">
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #1a1a2e; color: #4ecca3;">
            <div style="font-size: 3rem; margin-bottom: 1rem;">🎱</div>
            <div style="font-size: 1.2rem; font-weight: 600;">Loading Snooker Tracker...</div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>navigator.serviceWorker.register('service-worker.js');</script>
    <script>
        function downloadFile(filename, content) {
            const blob = new Blob([content], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function vibrate(ms) {
            if (navigator.vibrate) navigator.vibrate(ms);
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('snooker_theme', theme);
        }

        function getTheme() {
            return localStorage.getItem('snooker_theme') || 'dark';
        }

        // Apply saved theme on load
        (function() {
            var theme = localStorage.getItem('snooker_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
        })();

        function triggerFileInput() {
            document.getElementById('import-file-input').click();
        }
    </script>
</body>

</html>
