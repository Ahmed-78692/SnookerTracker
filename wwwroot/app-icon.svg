<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark background -->
  <rect width="512" height="512" rx="80" fill="#0a0e1a"/>
  
  <!-- Subtle green felt glow -->
  <circle cx="256" cy="256" r="180" fill="#0d6b32" opacity="0.15"/>
  
  <!-- Red ball cluster (triangle shape) -->
  <circle cx="220" cy="200" r="28" fill="#e74c3c"/>
  <circle cx="256" cy="185" r="28" fill="#dc3545"/>
  <circle cx="292" cy="200" r="28" fill="#e74c3c"/>
  <circle cx="238" cy="230" r="28" fill="#dc3545"/>
  <circle cx="274" cy="230" r="28" fill="#e74c3c"/>
  <circle cx="256" cy="260" r="28" fill="#dc3545"/>
  
  <!-- Highlight on reds -->
  <circle cx="212" cy="192" r="7" fill="rgba(255,255,255,0.2)"/>
  <circle cx="248" cy="177" r="7" fill="rgba(255,255,255,0.2)"/>
  <circle cx="284" cy="192" r="7" fill="rgba(255,255,255,0.2)"/>
  
  <!-- Black ball (hero) -->
  <circle cx="256" cy="340" r="35" fill="#111827"/>
  <circle cx="256" cy="340" r="33" fill="none" stroke="#374151" stroke-width="1.5"/>
  <circle cx="246" cy="328" r="8" fill="rgba(255,255,255,0.12)"/>
  
  <!-- Number 7 on black -->
  <text x="256" y="350" text-anchor="middle" font-family="Arial" font-size="28" font-weight="bold" fill="#ffffff">7</text>
  
  <!-- Accent ring around black -->
  <circle cx="256" cy="340" r="42" fill="none" stroke="#00d4aa" stroke-width="3" opacity="0.6"/>
  
  <!-- Cue stick (diagonal) -->
  <line x1="90" y1="420" x2="200" y2="290" stroke="#c8a45c" stroke-width="7" stroke-linecap="round"/>
  <line x1="85" y1="425" x2="95" y2="415" stroke="#f5e6c8" stroke-width="7" stroke-linecap="round"/>
  <line x1="195" y1="295" x2="205" y2="285" stroke="#8B6914" stroke-width="7" stroke-linecap="round"/>
  
  <!-- Bottom accent line -->
  <rect x="156" y="440" width="200" height="3" rx="2" fill="#00d4aa" opacity="0.5"/>
  
  <!-- "ST" initials subtle -->
  <text x="256" y="475" text-anchor="middle" font-family="Arial" font-size="24" font-weight="800" fill="#00d4aa" opacity="0.7" letter-spacing="8">ST</text>
</svg>
