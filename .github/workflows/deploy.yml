name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish
        run: dotnet publish SnookerTracker.csproj -c Release -o release

      - name: Fix paths for GitHub Pages
        run: |
          sed -i 's|<base href="/" />|<base href="/SnookerTracker/" />|g' release/wwwroot/index.html
          sed -i 's|"start_url": "/"|"start_url": "/SnookerTracker/"|g' release/wwwroot/manifest.webmanifest
          sed -i 's|"scope": "/"|"scope": "/SnookerTracker/"|g' release/wwwroot/manifest.webmanifest
          touch release/wwwroot/.nojekyll
          cp release/wwwroot/index.html release/wwwroot/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
